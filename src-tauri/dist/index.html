<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kura</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        height: 100vh;
        margin: 0;
        background: #f7f6f3;
        color: #3a3a37;
      }
      .box { text-align: center; }
      .spinner {
        width: 28px; height: 28px; margin: 0 auto 16px;
        border: 3px solid #d9d7cf; border-top-color: #8a8775;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!--
      This is the desktop shell's startup screen. The Rust side launches the
      bundled Next.js server as a hidden sidecar, waits for it to listen, then
      navigates this window to it. No hardcoded redirect — the port is chosen at
      runtime, so a stale localhost:3000 can no longer cause "connection denied".
    -->
    <div class="box">
      <div class="spinner"></div>
      <div>Kura を起動しています…</div>
    </div>
  </body>
</html>
