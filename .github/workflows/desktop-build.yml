name: Build Windows desktop (Tauri)

# Builds the Kura Windows desktop app (.exe / MSI).
#  - Push a v* tag  -> builds, signs, and publishes a GitHub Release with latest.json
#                      (this is what the in-app auto-updater reads).
#  - Manual run     -> builds signed installers and uploads them as workflow artifacts
#                      (no release published).
#
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   TAURI_SIGNING_PRIVATE_KEY           - contents of the updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  - its password
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Fetch Node sidecar
        run: npm run tauri:node

      - name: Generate app icons (placeholder if none committed)
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) {
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap 1024,1024
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(47,111,79))
            $bmp.Save("$PWD/app-icon.png",[System.Drawing.Imaging.ImageFormat]::Png)
            npm run tauri icon app-icon.png
          }

      # --- Tagged release: build, sign, publish a GitHub Release + latest.json ---
      - name: Build, sign & publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kura ${{ github.ref_name }}"
          releaseDraft: false
          includeUpdaterJson: true

      # --- Manual run: signed build only, uploaded as a workflow artifact ---
      - name: Build (test, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installers
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: kura-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/msi/*.msi
