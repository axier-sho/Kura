name: Build Windows desktop (Tauri)

# Builds the Kura Windows desktop app (.exe / MSI). Run manually or on a tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Generate app icons (placeholder if none committed)
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) {
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap 1024,1024
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(47,111,79))
            $bmp.Save("$PWD/app-icon.png",[System.Drawing.Imaging.ImageFormat]::Png)
            npm run tauri icon app-icon.png
          }

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: kura-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
